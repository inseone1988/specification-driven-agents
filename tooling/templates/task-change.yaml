# Task/Change Specification: {{title}}
#
# This specification describes a concrete task, feature implementation,
# or architectural change. It bridges domain specs with implementation.

meta:
  id: {{id}}
  title: {{title}}
  type: task-change
  version: 0.1.0
  contract_version: 0.1.0
  compatibility:
    supported_from: 0.1.0
    deprecated_after: null
  status: draft
  owner: {{owner}}
  created_at: {{date}}
  updated_at: {{date}}
  tags: {{#if tags}}
{{#each tags}}
    - {{this}}
{{/each}}
  {{else}}[]{{/if}}

authority:
  level: task-change
  inherits_from:
    - {{parent_spec}}
  depends_on: {{#if dependencies}}
{{#each dependencies}}
    - {{this}}
{{/each}}
  {{else}}[]{{/if}}
  supersedes: []
  conflicts_with: []

purpose:
  summary: {{summary}}
  problem: |
    {{problem}}
  scope:
    includes: {{#if scope_includes}}
{{#each scope_includes}}
      - {{this}}
{{/each}}
    {{else}}[]{{/if}}
    excludes: {{#if scope_excludes}}
{{#each scope_excludes}}
      - {{this}}
{{/each}}
    {{else}}[]{{/if}}
  non_goals:
    - [List what this task explicitly does not cover]

context:
  bounded_context: {{bounded_context}}
  actors: {{#if actors}}
{{#each actors}}
    - name: {{name}}
      role: {{role}}
{{/each}}
  {{else}}[]{{/if}}
  capabilities: {{#if capabilities}}
{{#each capabilities}}
    - {{this}}
{{/each}}
  {{else}}[]{{/if}}
  constraints: {{#if constraints}}
{{#each constraints}}
    - {{this}}
{{/each}}
  {{else}}[]{{/if}}

contracts:
  invariants: {{#if invariants}}
{{#each invariants}}
    - {{this}}
{{/each}}
  {{else}}[]{{/if}}
  validations: {{#if validations}}
{{#each validations}}
    - {{this}}
{{/each}}
  {{else}}[]{{/if}}

implementation:
  targets: {{#if targets}}
{{#each targets}}
    - {{this}}
{{/each}}
  {{else}}[]{{/if}}
  affected_paths: {{#if affected_paths}}
{{#each affected_paths}}
    - {{this}}
{{/each}}
  {{else}}[]{{/if}}
  generation_mode: manual
  migration_strategy: safe
  notes: {{#if notes}}
{{#each notes}}
    - {{this}}
{{/each}}
  {{else}}[]{{/if}}

validation:
  required_checks: {{#if checks}}
{{#each checks}}
    - {{this}}
{{/each}}
  {{else}}[]{{/if}}
  acceptance_criteria: {{#if acceptance}}
{{#each acceptance}}
    - {{this}}
{{/each}}
  {{else}}[]{{/if}}

history:
  change_reason: {{change_reason | "Initial task specification"}}
  previous_version: null
  change_type: additive
  approved_by:
    - {{owner}}
  review_ref: null
