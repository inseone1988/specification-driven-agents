# API Specification: {{title}}
#
# API specifications define the interface contracts for external consumers.
# They specify endpoints, request/response schemas, authentication, and
# error handling patterns for REST, GraphQL, or other API styles.

meta:
  id: {{id}}
  title: {{title}}
  type: api
  version: 0.1.0
  contract_version: 0.1.0
  compatibility:
    supported_from: 0.1.0
    deprecated_after: null  # Set date when this API should be deprecated
  status: draft  # draft | review | approved | implemented | deprecated | archived
  owner: {{owner}}
  created_at: {{date}}
  updated_at: {{date}}
  tags: []  # e.g., ["public-api", "internal-api", "partner-api", "v1"]

authority:
  level: implementation
  inherits_from:
    - genesis  # All APIs inherit from genesis
    - relevant_standards  # e.g., standard-api-design, standard-security
    - relevant_domains  # e.g., domain-user-management, domain-orders
  depends_on: []  # Other specs this API depends on
  supersedes: []  # Previous API versions this replaces
  conflicts_with: []  # Other specs that conflict with this API

purpose:
  summary: {{summary}}
  problem: |
    [Describe the API interface problem being solved]
    
    Example:
    "External clients need a stable, well-documented interface to access
    user management functionality without understanding internal domain logic."
  scope:
    includes:
      - API endpoints, routes, and operations
      - Request and response schemas (JSON, XML, etc.)
      - Authentication and authorization mechanisms
      - Error handling patterns and status codes
      - Rate limiting and throttling policies
      - API versioning strategy
      - Documentation and examples
    excludes:
      - Internal implementation details and business logic
      - Database schemas and persistence layers
      - Infrastructure and deployment concerns
      - User interface components
  non_goals:
    - [List API aspects not covered]
    # Example:
    # - Internal service-to-service communication
    # - Database optimization strategies
    # - UI component library design

context:
  bounded_context: api  # Fixed for API specifications
  api_style: rest  # rest | graphql | grpc | soap | other
  api_audience: public  # public | internal | partner | admin
  versioning_strategy: url  # url | header | media-type
  actors:
    - api-consumers  # External clients using the API
    - api-developers  # Developers implementing the API
    - api-maintainers  # Team maintaining the API
    - api-documentation-writers  # Technical writers
    - api-testers  # QA and testing team
  capabilities:
    - Expose domain functionality via standardized interfaces
    - Handle authentication, authorization, and security
    - Validate requests and format consistent responses
    - Provide clear error messages and status codes
    - Support versioning and backward compatibility
  constraints:
    - Must follow API design standards and patterns
    - Must be versioned appropriately with deprecation policies
    - Must provide clear, accurate documentation
    - Must handle errors consistently across all endpoints
    - Must respect rate limiting and security constraints

contracts:
  # Required fields by schema
  invariants:
    - [List API invariants that must always hold]
    # Example:
    # - "API contracts must remain stable within a major version"
    # - "Breaking changes require a new major version"
    # - "All errors must follow the standard error format"
    # - "Authentication must be required for all endpoints (except public)"
  
  validations:
    - [List API validations]
    # Example:
    # - "Request parameter validation"
    # - "Response format validation"
    # - "Authentication token validation"

  # API endpoints/operations (conditional field for api type)
  endpoints:
    - [List API endpoints with full specifications]
    # Example REST endpoint structure:
    # - path: /api/v1/users
    #   method: GET
    #   operation: listUsers
    #   description: "Retrieve a list of users with optional filtering"
    #   authentication: bearer-token
    #   authorization: user.read
    #   parameters:
    #     - name: limit
    #       type: integer
    #       required: false
    #       default: 20
    #       description: "Maximum number of users to return"
    #   request_body: null
    #   responses:
    #     - status: 200
    #       description: "Successful response"
    #       schema:
    #         type: array
    #         items:
    #           $ref: "#/components/schemas/User"
    #     - status: 401
    #       description: "Unauthorized"
    #       schema:
    #         $ref: "#/components/schemas/Error"
    
    # Example GraphQL operation:
    # - type: query
    #   name: getUser
    #   description: "Retrieve a user by ID"
    #   authentication: bearer-token
    #   authorization: user.read
    #   parameters:
    #     - name: id
    #       type: ID!
    #       description: "User identifier"
    #   returns: User
  
  # Request/response schemas
  schemas:
    - [Define data schemas for requests and responses]
    # Example:
    # - name: User
    #   description: "User representation"
    #   properties:
    #     id:
    #       type: string
    #       format: uuid
    #       description: "Unique user identifier"
    #     email:
    #       type: string
    #       format: email
    #       description: "User email address"
    #     name:
    #       type: string
    #       description: "User full name"
  
  # Error patterns
  errors:
    - [Define error types and formats]
    # Example:
    # - type: ValidationError
    #   status: 400
    #   code: VALIDATION_FAILED
    #   format:
    #     type: object
    #     properties:
    #       error:
    #         type: string
    #         example: "Validation failed"
    #       details:
    #         type: array
    #         items:
    #           type: object
    #           properties:
    #             field: {type: string}
    #             message: {type: string}
  
  # Authentication/authorization
  security:
    authentication_methods:
      - [List supported authentication methods]
      # Example:
      # - type: bearer-token
      #   description: "JWT bearer token authentication"
      #   header: Authorization: Bearer {token}
    authorization_scopes:
      - [List required authorization scopes]
      # Example:
      # - scope: user.read
      #   description: "Read access to user data"
      # - scope: user.write
      #   description: "Write access to user data"
  
  rate_limiting:
    - [Define rate limiting rules]
    # Example:
    # - scope: ip-address
    #   limit: 100
    #   period: minute
    # - scope: user
    #   limit: 1000
    #   period: hour

implementation:
  targets:
    - src/api/  # API implementation code
    - docs/api/  # API documentation
    - openapi.yaml  # OpenAPI/Swagger specification
    - graphql/schema.graphql  # GraphQL schema
  affected_paths:
    - src/api/**/*  # All API implementation files
    - docs/api/**/*  # All API documentation
    - tests/api/**/*  # API tests
    - config/api/**/*  # API configuration
  generation_mode: guided  # guided | automatic | manual
  migration_strategy: safe  # safe | breaking | deprecation
  api_framework:  # Recommended framework(s)
    - express  # Node.js
    # - fastapi  # Python
    # - spring-boot  # Java
  documentation_format:
    - openapi  # OpenAPI/Swagger
    # - asyncapi  # For async APIs
    # - graphql-sdl  # GraphQL Schema Definition Language
  notes:
    - Follow RESTful principles for REST APIs
    - Use consistent naming conventions
    - Include comprehensive documentation
    - Implement proper error handling
    - Consider API versioning from the start

validation:
  required_checks:
    - schema_validation  # Validate request/response schemas
    - endpoint_validation  # Validate endpoint definitions
    - security_validation  # Validate security requirements
    - versioning_validation  # Validate versioning strategy
  acceptance_criteria:
    - All endpoints fully documented with examples
    - Request/response schemas defined and validated
    - Authentication and authorization specified
    - Error handling patterns consistent
    - Versioning strategy clear and implemented
  test_requirements:
    - api_contract_tests  # Contract testing (OpenAPI, etc.)
    - integration_tests  # End-to-end API tests
    - security_tests  # Authentication/authorization tests
    - performance_tests  # Load and performance testing
    - backward_compatibility_tests  # Version compatibility tests
  traceability_requirements:
    - link_to_domain_specs  # Must reference underlying domains
    - link_to_implementation  # Must link to implementation code
    - link_to_documentation  # Must link to API documentation

agent_directives:
  required_read_order:
    - genesis  # Overall vision and principles
    - relevant_standards  # API design standards
    - relevant_domains  # Underlying domain logic
    - this_api_spec  # This API specification
  must:
    - Generate API endpoints that comply with contracts
    - Include request/response validation logic
    - Document API usage with examples
    - Implement proper error handling
    - Follow security best practices
    - Respect rate limiting constraints
  must_not:
    - Expose internal implementation details
    - Violate security or privacy constraints
    - Create breaking changes without proper versioning
    - Implement business logic in API layer
  completion_requirements:
    - All API endpoints implemented and tested
    - Documentation complete and accurate
    - Security measures implemented
    - Error handling consistent across endpoints
    - Performance meets requirements

history:
  change_reason: initial API specification
  previous_version: null
  change_type: additive  # additive | breaking | deprecation | correction | refactor
  approved_by:
    - {{owner}}
  review_ref: null  # Reference to review discussion
  notes:
    - Initial API contract definition
    # Add other notes as needed